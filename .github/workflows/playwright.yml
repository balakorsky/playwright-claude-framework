name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api --reporter=github,html,json
        env:
          TEST_ENV: ${{ vars.TEST_ENV || 'dev' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Quality gate
        if: always()
        run: node scripts/quality-gate.mjs results.json 0.8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: playwright-report/
          retention-days: 14

  # ── UI (auth) ─────────────────────────────────────────────────────────────────
  ui:
    name: UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }} --reporter=github,html,json
        env:
          TEST_ENV: ${{ vars.TEST_ENV || 'dev' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Quality gate
        if: always()
        run: node scripts/quality-gate.mjs results.json 0.8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-ui-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

  # ── E2E (business scenarios) ──────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=e2e --reporter=github,html,json
        env:
          TEST_ENV: ${{ vars.TEST_ENV || 'dev' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Quality gate
        if: always()
        run: node scripts/quality-gate.mjs results.json 0.8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e
          path: playwright-report/
          retention-days: 14

  # ── Visual regression ─────────────────────────────────────────────────────────
  visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npx playwright test --project=visual --reporter=github,html,json
        env:
          TEST_ENV: ${{ vars.TEST_ENV || 'dev' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Quality gate
        if: always()
        run: node scripts/quality-gate.mjs results.json 0.8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-visual
          path: playwright-report/
          retention-days: 14

  # ── Accessibility ─────────────────────────────────────────────────────────────
  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npx playwright test --project=a11y --reporter=github,html,json
        env:
          TEST_ENV: ${{ vars.TEST_ENV || 'dev' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Quality gate
        if: always()
        run: node scripts/quality-gate.mjs results.json 0.8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-a11y
          path: playwright-report/
          retention-days: 14
